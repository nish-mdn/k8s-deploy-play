apiVersion: apps/v1
kind: Deployment
metadata:
  name: rails-app-pod
  labels:
    app: rails-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rails-app
  template:
    metadata:
      labels:
        app: rails-app
    spec:
      containers:
      - name: rails-app
        image: 177701659471.dkr.ecr.us-east-1.amazonaws.com/mdn-docker-repo:latest
        ports:
        - containerPort: 3000
        imagePullPolicy: Always
